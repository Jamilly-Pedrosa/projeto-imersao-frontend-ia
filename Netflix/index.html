<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlura</title>
    <link rel="stylesheet" href="styles.css">
    <script src="/js/script.js"></script> <!--Theme Manager--->
</head>

<body>
    <button class="theme-toggle" aria-label="Alternar tema" title="Alternar entre modo claro e escuro">
        <span class="theme-icon">🌙</span>
    </button>
    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">

            <nav class="profiles">
                <a href="/catalogo/catalogo.html" class="profiles" data-profile-name="Mia"
                    data-profile-image="/assets/perfil-1.jpg">
                    <figure>
                        <img src="/assets/perfil-1.jpg" alt="Perfil 1">
                        <figcaption>Mia</figcaption>
                    </figure>
                </a>

                <a href="/catalogo/catalogo.html" class="profiles" data-profile-name="Yuuki"
                    data-profile-image="/assets/perfil-2.jpg">
                    <figure>
                        <img src="/assets/perfil-2.jpg" alt="Perfil 2">
                        <figcaption>Yuuki</figcaption>
                    </figure>
                </a>

                <a href="/catalogo/catalogo.html" class="profiles" data-profile-name="Bille"
                    data-profile-image="/assets/perfil-3.jpg">
                    <figure>
                        <img src="/assets/perfil-3.jpg" alt="Perfil 3">
                        <figcaption>Bille</figcaption>
                    </figure>
                </a>
            </nav>

        </section>
    </main>

    <script src="/js/index.js"></script>

</body>

</html>
